<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AquaVisionAI</title>

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    body{
      background:linear-gradient(to bottom,#031b44,#04244d,#04224a);
      min-height:100vh;
      color:white;
      overflow-x:hidden;
    }

    /* FLOATING GLOW BACKGROUND */

    .bg-orbs{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      pointer-events:none;
      z-index:0;
      overflow:hidden;
    }

    .orb{
      position:absolute;
      border-radius:50%;
      filter:blur(80px);
      opacity:0;
      animation:floatOrb linear infinite;
    }

    .orb-1{
      width:420px;
      height:420px;
      background:radial-gradient(circle,rgba(29,214,255,0.18) 0%,transparent 70%);
      top:8%;
      left:-10%;
      animation-duration:18s;
      animation-delay:0s;
    }

    .orb-2{
      width:520px;
      height:520px;
      background:radial-gradient(circle,rgba(0,100,255,0.14) 0%,transparent 70%);
      top:40%;
      right:-12%;
      animation-duration:24s;
      animation-delay:-6s;
    }

    .orb-3{
      width:360px;
      height:360px;
      background:radial-gradient(circle,rgba(29,214,255,0.12) 0%,transparent 70%);
      bottom:5%;
      left:20%;
      animation-duration:20s;
      animation-delay:-3s;
    }

    .orb-4{
      width:280px;
      height:280px;
      background:radial-gradient(circle,rgba(100,180,255,0.15) 0%,transparent 70%);
      top:20%;
      left:55%;
      animation-duration:15s;
      animation-delay:-9s;
    }

    .orb-5{
      width:460px;
      height:460px;
      background:radial-gradient(circle,rgba(0,60,180,0.12) 0%,transparent 70%);
      bottom:25%;
      right:5%;
      animation-duration:22s;
      animation-delay:-12s;
    }

    .orb-6{
      width:200px;
      height:200px;
      background:radial-gradient(circle,rgba(29,214,255,0.2) 0%,transparent 70%);
      top:65%;
      left:8%;
      animation-duration:13s;
      animation-delay:-4s;
    }

    @keyframes floatOrb{
      0%{
        transform:translate(0px,0px) scale(1);
        opacity:0;
      }
      10%{
        opacity:1;
      }
      30%{
        transform:translate(40px,-55px) scale(1.08);
      }
      55%{
        transform:translate(-30px,-90px) scale(0.94);
      }
      75%{
        transform:translate(55px,-130px) scale(1.05);
        opacity:1;
      }
      90%{
        opacity:0.5;
      }
      100%{
        transform:translate(20px,-180px) scale(0.9);
        opacity:0;
      }
    }

    /* Ensure content sits above orbs */
    .navbar,
    .hero,
    .result-modal{
      position:relative;
      z-index:1;
    }

    /* FLOATING OBJECTS */

    .floating-objects{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      pointer-events:none;
      z-index:0;
      overflow:hidden;
    }

    .float-obj{
      position:absolute;
      opacity:0;
      will-change:transform,opacity;
    }

    .fish{
      font-size:28px;
      filter:drop-shadow(0 0 8px rgba(29,214,255,0.55));
      animation:fishSwim ease-in-out infinite;
    }
    .fish-sm{ font-size:17px; }
    .fish-lg{ font-size:40px; }

    .bubble{
      border-radius:50%;
      background:radial-gradient(circle at 35% 35%,rgba(255,255,255,0.35),rgba(29,214,255,0.06));
      border:1px solid rgba(29,214,255,0.28);
      box-shadow:0 0 10px rgba(29,214,255,0.18), inset 0 0 8px rgba(255,255,255,0.1);
      animation:bubbleRise ease-in-out infinite;
    }
    .bubble-xs{ width:9px;  height:9px;  }
    .bubble-sm{ width:17px; height:17px; }
    .bubble-md{ width:27px; height:27px; }
    .bubble-lg{ width:38px; height:38px; }

    .sparkle{
      width:5px;
      height:5px;
      border-radius:50%;
      background:#1dd6ff;
      box-shadow:0 0 8px 3px rgba(29,214,255,0.5);
      animation:sparklePulse ease-in-out infinite;
    }

    .fin{
      width:22px;
      height:13px;
      border-radius:50% 0 50% 0;
      background:rgba(29,214,255,0.15);
      border:1px solid rgba(29,214,255,0.32);
      box-shadow:0 0 10px rgba(29,214,255,0.18);
      animation:leafDrift ease-in-out infinite;
    }

    @keyframes fishSwim{
      0%  { transform:translateX(0)    translateY(0)     scaleX(1);  opacity:0; }
      8%  { opacity:0.5; }
      30% { transform:translateX(110px) translateY(-55px) scaleX(1); }
      50% { transform:translateX(55px)  translateY(-130px) scaleX(-1); }
      70% { transform:translateX(170px) translateY(-200px) scaleX(-1); }
      92% { opacity:0.4; }
      100%{ transform:translateX(80px)  translateY(-300px) scaleX(1); opacity:0; }
    }

    @keyframes bubbleRise{
      0%  { transform:translateX(0)    translateY(0)    scale(1);    opacity:0; }
      10% { opacity:0.65; }
      30% { transform:translateX(11px)  translateY(-75px)  scale(1.03); }
      55% { transform:translateX(-9px)  translateY(-160px) scale(0.97); }
      80% { transform:translateX(13px)  translateY(-250px) scale(1.02); opacity:0.45; }
      100%{ transform:translateX(-5px)  translateY(-360px) scale(0.9);  opacity:0; }
    }

    @keyframes sparklePulse{
      0%  { transform:translateY(0)       scale(1);   opacity:0; }
      15% { opacity:0.9; }
      50% { transform:translateY(-110px)  scale(1.4); opacity:0.55; }
      85% { opacity:0.25; }
      100%{ transform:translateY(-250px)  scale(0.6); opacity:0; }
    }

    @keyframes leafDrift{
      0%  { transform:translate(0,0)          rotate(0deg);   opacity:0; }
      10% { opacity:0.45; }
      35% { transform:translate(28px,-75px)   rotate(24deg); }
      60% { transform:translate(-18px,-165px) rotate(-14deg); }
      85% { transform:translate(22px,-250px)  rotate(18deg);  opacity:0.35; }
      100%{ transform:translate(0,-330px)     rotate(5deg);   opacity:0; }
    }

    /* NAVBAR */

    .navbar{
      width:100%;
      height:90px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 70px;
      background:#041838;
      border-bottom:1px solid rgba(255,255,255,0.05);
      position:sticky;
      top:0;
      z-index:100;
    }

    .logo{
      display:flex;
      align-items:center;
      gap:16px;
    }

    .logo-icon{
      width:42px;
      height:42px;
      border-radius:12px;
      display:flex;
      align-items:center;
      justify-content:center;
      color:#1dd6ff;
      font-size:24px;
    }

    .logo h1{
      font-size:28px;
      font-weight:700;
      letter-spacing:0.5px;
    }

    .nav-links{
      display:flex;
      align-items:center;
      gap:28px;
    }

    .nav-links a{
      text-decoration:none;
      color:#d8e6ff;
      font-size:22px;
      font-weight:500;
      display:flex;
      align-items:center;
      gap:10px;
      padding:14px 26px;
      border-radius:20px;
      transition:0.3s ease;
    }

    .nav-links a i{
      font-size:20px;
    }

    .nav-links a:hover{
      background:rgba(255,255,255,0.05);
      color:#1dd6ff;
    }

    .nav-links .active{
      background:#102a56;
      color:#1dd6ff;
      box-shadow:0 0 20px rgba(29,214,255,0.08);
    }

    /* HERO SECTION */

    .hero{
      width:100%;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      padding:60px 20px 80px;
      text-align:center;
    }

    .hero h2{
      font-size:68px;
      font-weight:800;
      line-height:1.1;
      margin-bottom:18px;
      letter-spacing:0.5px;
    }

    .hero p{
      font-size:26px;
      color:#9db4d8;
      margin-bottom:55px;
      font-weight:400;
    }

    /* UPLOAD BOX */

    .upload-container{
      width:780px;
      max-width:95%;
      min-height:520px;
      border:3px dashed rgba(255,255,255,0.15);
      border-radius:40px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      background:linear-gradient(to bottom right,rgba(8,33,70,0.8),rgba(4,28,61,0.85));
      position:relative;
      overflow:hidden;
      transition:0.35s ease;
      cursor:pointer;
    }

    .upload-container:hover{
      border-color:rgba(29,214,255,0.45);
      transform:translateY(-4px);
      box-shadow:0 20px 50px rgba(0,0,0,0.35);
    }

    .upload-container::before{
      content:'';
      position:absolute;
      width:280px;
      height:280px;
      background:rgba(29,214,255,0.06);
      border-radius:50%;
      filter:blur(40px);
      top:-100px;
      right:-80px;
    }

    .upload-container::after{
      content:'';
      position:absolute;
      width:240px;
      height:240px;
      background:rgba(0,125,255,0.06);
      border-radius:50%;
      filter:blur(50px);
      bottom:-100px;
      left:-100px;
    }

    .upload-icon{
      width:130px;
      height:130px;
      border-radius:35px;
      background:linear-gradient(145deg,#0f4f80,#08395e);
      display:flex;
      align-items:center;
      justify-content:center;
      margin-bottom:40px;
      box-shadow:0 15px 35px rgba(0,0,0,0.25);
      z-index:2;
    }

    .upload-icon i{
      font-size:60px;
      color:#27dbff;
    }

    .upload-container h3{
      font-size:42px;
      font-weight:700;
      margin-bottom:16px;
      z-index:2;
    }

    .upload-container p{
      font-size:24px;
      color:#aac0de;
      z-index:2;
    }

    .upload-container p span{
      color:#17d6ff;
      text-decoration:underline;
      font-weight:600;
      cursor:pointer;
    }

    .upload-container input{
      display:none;
    }

    .supported-format{
      margin-top:35px;
      color:#6f88ad;
      font-size:17px;
      z-index:2;
    }

    /* RESPONSIVE */

    @media(max-width:1200px){

      .hero h2{
        font-size:56px;
      }

      .hero p{
        font-size:22px;
      }

      .upload-container{
        min-height:470px;
      }
    }

    @media(max-width:900px){

      .navbar{
        padding:0 25px;
        height:auto;
        flex-direction:column;
        gap:20px;
        padding-top:20px;
        padding-bottom:20px;
      }

      .nav-links{
        flex-wrap:wrap;
        justify-content:center;
      }

      .nav-links a{
        font-size:18px;
      }

      .hero h2{
        font-size:46px;
      }

      .hero p{
        font-size:20px;
      }

      .upload-container{
        min-height:430px;
        border-radius:30px;
      }

      .upload-container h3{
        font-size:32px;
      }

      .upload-container p{
        font-size:20px;
      }
    }

    @media(max-width:600px){

      .logo h1{
        font-size:24px;
      }

      .hero{
        padding-top:45px;
      }

      .hero h2{
        font-size:38px;
      }

      .hero p{
        font-size:18px;
      }

      .upload-container{
        min-height:390px;
        padding:20px;
      }

      .upload-icon{
        width:100px;
        height:100px;
      }

      .upload-icon i{
        font-size:44px;
      }

      .upload-container h3{
        font-size:28px;
      }

      .upload-container p{
        font-size:18px;
      }
    }

    /* =========================
   RESULT MODAL
========================= */

.result-modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.65);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9999;
  backdrop-filter:blur(6px);
}

.result-box{
  width:420px;
  max-width:90%;
  background:linear-gradient(to bottom,#072552,#041733);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:28px;
  padding:40px 30px;
  text-align:center;
  position:relative;
  animation:popup 0.35s ease;
  box-shadow:0 20px 60px rgba(0,0,0,0.4);
}

@keyframes popup{
  from{
    transform:scale(0.7);
    opacity:0;
  }
  to{
    transform:scale(1);
    opacity:1;
  }
}

.close-btn{
  position:absolute;
  top:18px;
  right:22px;
  font-size:32px;
  color:#b8d5ff;
  cursor:pointer;
  transition:0.3s;
}

.close-btn:hover{
  color:#19d7ff;
}

.result-icon{
  width:100px;
  height:100px;
  margin:auto;
  border-radius:25px;
  background:linear-gradient(145deg,#0f4f80,#08395e);
  display:flex;
  align-items:center;
  justify-content:center;
  margin-bottom:25px;
}

.result-icon i{
  font-size:45px;
  color:#22dcff;
}

.result-box h2{
  font-size:32px;
  margin-bottom:25px;
}

.result-content{
  margin-bottom:30px;
}

.result-content p{
  font-size:22px;
  margin:14px 0;
  color:#dcecff;
}

.result-content span{
  color:#20d7ff;
  font-weight:600;
}

#tryAgainBtn{
  background:#12cfff;
  border:none;
  color:#00152f;
  padding:14px 28px;
  border-radius:14px;
  font-size:18px;
  font-weight:700;
  cursor:pointer;
  transition:0.3s;
}

#tryAgainBtn:hover{
  transform:translateY(-2px);
  box-shadow:0 10px 20px rgba(18,207,255,0.3);
}

  </style>
</head>
<body>

  <!-- FLOATING OBJECTS -->
  <div class="floating-objects" id="floatingObjects"></div>

  <!-- FLOATING GLOW ORBS -->
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="orb orb-4"></div>
    <div class="orb orb-5"></div>
    <div class="orb orb-6"></div>
  </div>

  <!-- ========================================
     NAVBAR SECTION START
     Copy this navbar into every page
======================================== -->

  <nav class="navbar">

    <div class="logo">
      <div class="logo-icon">
        <i class="fa-solid fa-fish-fins"></i>
      </div>
      <h1>AquaVision AI</h1>
    </div>

    <div class="nav-links">
      <!-- IMPORTANT:
      Use class="active" ONLY for the current page.

      Example:
      index.html    -> Identify link active
      about.html    -> About link active
      discover.html -> Discover link active
      -->

      <a href="index.html" class="active">
        <i class="fa-solid fa-magnifying-glass"></i>
        Identify
      </a>

      <a href="discover.html">
        <i class="fa-solid fa-water"></i>
        Discover
      </a>

      <a href="about.html">
        <i class="fa-regular fa-circle-info"></i>
        About
      </a>

    </div>

  </nav>

<!-- ========================================
     NAVBAR SECTION END
======================================== -->

  <!-- ========================================
     HERO SECTION START
     Main landing section
======================================== -->

  <section class="hero">

    <h2>Identify Species</h2>

    <p>Capture or upload a photo of your fish</p>

    <!-- UPLOAD BOX -->

    <label class="upload-container">

      <input type="file" id="fileInput" accept="image/*">

      <div class="upload-icon">
        <i class="fa-solid fa-arrow-up-from-bracket"></i>
      </div>

      <h3>Ready to identify?</h3>

      <p>
        Drag your photo here or
        <span>browse files</span>
      </p>

      <div class="supported-format">
        Supported formats: JPG, PNG, WEBP
      </div>

    </label>

  </section>
<div class="result-modal" id="resultModal">

  <div class="result-box">

    <span class="close-btn" id="closeModal">&times;</span>

    <div class="result-icon">
      <i class="fa-solid fa-fish"></i>
    </div>

    <h2>Prediction Result</h2>

    <div class="result-content">

      <p>
        <strong>Fish:</strong>
        <span id="fishName">---</span>
      </p>

      <p>
        <strong>Confidence:</strong>
        <span id="fishConfidence">---</span>
      </p>

    </div>

    <button id="tryAgainBtn">
      Try Another Image
    </button>

  </div>

</div>

<script>

const fileInput = document.querySelector('input[type="file"]');

fileInput.addEventListener("change", async function () {

    const file = this.files[0];

    if (!file) return;

    // Create form data
    const formData = new FormData();

    formData.append("image", file);

    try {

        // Send image to Flask backend
        const response = await fetch(
            "http://127.0.0.1:5000/predict",
            {
                method: "POST",
                body: formData
            }
        );

        const data = await response.json();

        // Show result
        if (data.success) {

           document.getElementById("fishName").innerText =
            data.fish;

           document.getElementById("fishConfidence").innerText =
            data.confidence + "%";

           document.getElementById("resultModal").style.display =
            "flex";

        } else {

            alert(data.message);
        }

    } catch (error) {

        console.error(error);

        alert("Upload failed");
    }

});
// CLOSE MODAL

const resultModal =
    document.getElementById("resultModal");

const closeModal =
    document.getElementById("closeModal");

const tryAgainBtn =
    document.getElementById("tryAgainBtn");

closeModal.onclick = () => {

    resultModal.style.display = "none";

    fileInput.value = "";
};

tryAgainBtn.onclick = () => {

    resultModal.style.display = "none";

    fileInput.value = "";
};

// Close when clicking outside

window.onclick = (e) => {

    if (e.target === resultModal) {

        resultModal.style.display = "none";

        fileInput.value = "";
    }
};

// ============================================
// FLOATING OBJECTS GENERATOR
// ============================================
(function(){
  const container = document.getElementById('floatingObjects');
  const objects = [
    { cls:'float-obj fish',         content:'🐠', dur:16, delay:0    },
    { cls:'float-obj fish fish-sm', content:'🐟', dur:22, delay:-5   },
    { cls:'float-obj fish fish-lg', content:'🐡', dur:19, delay:-11  },
    { cls:'float-obj fish fish-sm', content:'🐠', dur:14, delay:-8   },
    { cls:'float-obj fish',         content:'🦈', dur:25, delay:-3   },
    { cls:'float-obj fish fish-sm', content:'🐟', dur:18, delay:-15  },
    { cls:'float-obj fish fish-lg', content:'🐠', dur:21, delay:-7   },
    { cls:'float-obj fish fish-sm', content:'🦐', dur:13, delay:-17  },
    { cls:'float-obj bubble bubble-xs', content:'', dur:9,  delay:-1  },
    { cls:'float-obj bubble bubble-sm', content:'', dur:12, delay:-4  },
    { cls:'float-obj bubble bubble-md', content:'', dur:15, delay:-9  },
    { cls:'float-obj bubble bubble-lg', content:'', dur:11, delay:-2  },
    { cls:'float-obj bubble bubble-xs', content:'', dur:8,  delay:-13 },
    { cls:'float-obj bubble bubble-sm', content:'', dur:10, delay:-6  },
    { cls:'float-obj bubble bubble-md', content:'', dur:14, delay:-18 },
    { cls:'float-obj bubble bubble-xs', content:'', dur:7,  delay:-10 },
    { cls:'float-obj bubble bubble-sm', content:'', dur:13, delay:-3  },
    { cls:'float-obj sparkle', content:'', dur:8,  delay:-2  },
    { cls:'float-obj sparkle', content:'', dur:11, delay:-7  },
    { cls:'float-obj sparkle', content:'', dur:9,  delay:-14 },
    { cls:'float-obj sparkle', content:'', dur:7,  delay:-5  },
    { cls:'float-obj sparkle', content:'', dur:12, delay:-19 },
    { cls:'float-obj fin', content:'', dur:17, delay:-4  },
    { cls:'float-obj fin', content:'', dur:20, delay:-10 },
    { cls:'float-obj fin', content:'', dur:15, delay:-1  },
  ];
  objects.forEach(function(o, i){
    const el = document.createElement('div');
    el.className = o.cls;
    el.textContent = o.content;
    const leftBase = (i / objects.length) * 100;
    const leftJitter = (Math.random() - 0.5) * 8;
    el.style.left = Math.min(Math.max(leftBase + leftJitter, 1), 97) + '%';
    el.style.top = (40 + Math.random() * 55) + '%';
    el.style.animationDuration = o.dur + 's';
    el.style.animationDelay    = o.delay + 's';
    container.appendChild(el);
  });
})();

</script>

     HERO SECTION END
======================================== -->
